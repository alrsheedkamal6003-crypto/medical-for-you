<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>مركز التدريب | شبكة الممرضين السودانيين</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* تعريف المتغيرات الأساسية كما هي */
        :root {
            --main-color: #00a884;
            --main-hover: #008f6f;
            --dark-blue: #1e272e;
            --light-bg: #f4f7f6;
            --accent-orange: #f39c12;
            --accent-yellow: #f1c40f;
        }

        body { font-family: 'Cairo', sans-serif; margin: 0; background-color: var(--light-bg); color: #333; scroll-behavior: smooth; }

        /* تنسيقاتك الأصلية للجمال والتمرير */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: var(--main-color); border-radius: 10px; }
        
        .navbar { padding: 15px 5%; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { text-decoration: none; color: var(--dark-blue); font-weight: bold; font-size: 1.4rem; display: flex; align-items: center; gap: 8px; }
        .logo span { color: var(--main-color); }
        .nav-links { list-style: none; display: flex; gap: 20px; }
        .nav-links a { text-decoration: none; color: #555; font-weight: 600; }

        .hero { display: flex; align-items: center; justify-content: center; text-align: center; color: white; height: 35vh; background: linear-gradient(135deg, rgba(30, 39, 46, 0.9), rgba(0, 168, 132, 0.85)); border-radius: 0 0 30px 30px; }
        .hero-content h1 { font-size: 2.5rem; }

        .section-title { text-align: center; margin: 60px 0 40px; position: relative; color: var(--dark-blue); font-size: 1.8rem; }
        .section-title::after { content: ''; width: 80px; height: 4px; background: var(--main-color); position: absolute; bottom: -12px; right: 50%; transform: translateX(50%); border-radius: 2px; }

        .training-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; margin-top: 40px; padding: 0 5%; }
        
        /* تصميم كروت الدورات الموحد */
        .course-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.05); transition: 0.4s; border-top: 6px solid var(--main-color); display: flex; flex-direction: column; }
        .course-card:hover { transform: translateY(-10px); }
        .course-header { padding: 25px 20px; background: #f9fdfc; }
        .course-category { background: var(--main-color); color: white; padding: 6px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .course-body { padding: 25px 20px; flex-grow: 1; }
        .course-info-list { list-style: none; padding: 0; margin: 0; font-size: 0.95rem; }
        .course-info-list li { margin-bottom: 12px; display: flex; align-items: center; gap: 12px; }
        .course-info-list i { color: var(--main-color); width: 25px; text-align: center; }
        .availability { font-weight: bold; color: var(--accent-orange); background: #fdebd0; padding: 2px 8px; border-radius: 5px; }
        
        .btn { padding: 12px 25px; border-radius: 10px; border: none; cursor: pointer; font-family: 'Cairo'; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-primary { background: var(--main-color); color: white; }
        .btn-secondary { background: transparent; border: 2px solid var(--accent-orange); color: var(--accent-orange); }

        /* الترشيح وModal */
        .nominate-section { background: linear-gradient(135deg, var(--dark-blue), #2c3e50); color: white; padding: 50px 30px; border-radius: 20px; margin: 60px 5%; text-align: center; }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); }
        .modal-content { background: white; margin: 8% auto; padding: 40px; border-radius: 20px; position: relative; max-width: 450px; }
        .close-btn { position: absolute; left: 20px; top: 15px; font-size: 32px; cursor: pointer; }

        .quick-access-btn { position: fixed; bottom: 30px; right: 30px; background: var(--main-color); color: white; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; cursor: pointer; z-index: 1001; }
        .quick-menu { display: none; position: fixed; bottom: 110px; right: 30px; background: white; width: 260px; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.15); z-index: 1000; max-height: 400px; overflow-y: auto; }
        .quick-menu ul { list-style: none; padding: 10px; margin: 0; }
        .quick-menu li a { display: flex; align-items: center; gap: 15px; padding: 12px 15px; text-decoration: none; color: #444; font-weight: 600; }
        
        footer { text-align: center; padding: 30px; background: var(--dark-blue); color: white; margin-top: 60px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="logo"><i class="fas fa-heart-pulse"></i> شبكة الممرضين <span>السودانيين</span></a>
        <ul class="nav-links">
            <li><a href="index.html"><i class="fas fa-home"></i> الرئيسية</a></li>
            <li><a href="training.html" style="color: var(--main-color);"><i class="fas fa-users"></i> التدريب</a></li>
        </ul>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>مركز <span style="color: var(--accent-yellow);">التدريب والترشيح</span></h1>
            <p>سجل في دوراتنا الحالية، ترقب برامجنا القادمة، أو شاركنا بترشيحك.</p>
        </div>
    </header>

    <h2 class="section-title" id="availableTitle">الدورات التدريبية المتاحة</h2>
    <div class="training-grid" id="availableContainer">
        </div>

    <h2 class="section-title" id="upcomingTitle">دورات تدريبية لاحقاً (برامج مرتقبة)</h2>
    <div class="training-grid" id="upcomingContainer">
        </div>

    <div class="nominate-section">
        <i class="fas fa-lightbulb" style="font-size: 3.5rem; color: var(--accent-yellow); margin-bottom: 20px;"></i>
        <h2>رشح موضوعاً تدريبياً</h2>
        <button class="btn btn-primary" style="width:auto; background: var(--accent-yellow); color: #333;" onclick="openModal('nominateModal', '')">أرسل ترشيحك الآن</button>
    </div>

    <div id="regModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModals()">&times;</span>
            <h2 id="regTitle">التسجيل في الدورة</h2>
            <form id="regForm" action="https://formspree.io/f/meerewpw" method="POST">
                <input type="hidden" name="اسم_الدورة" id="hiddenCourseReg">
                <input type="text" name="الاسم_الكامل" placeholder="الاسم الكامل" required style="width:100%; margin-bottom:10px; padding:10px; border-radius:10px; border:1px solid #ddd;">
                <input type="tel" name="رقم_الواتساب" placeholder="رقم الواتساب" required style="width:100%; margin-bottom:15px; padding:10px; border-radius:10px; border:1px solid #ddd;">
                <button type="submit" class="btn btn-primary">تأكيد طلب التسجيل</button>
            </form>
        </div>
    </div>

    <div id="notifyModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModals()">&times;</span>
            <h2 id="notifyTitle">أعلمني عند البدء</h2>
            <form id="notifyForm" action="https://formspree.io/f/meerewpw" method="POST">
                <input type="hidden" name="اسم_الدورة" id="hiddenCourseNotify">
                <input type="email" name="البريد_الإلكتروني" placeholder="أدخل بريدك الإلكتروني" required style="width:100%; margin-bottom:15px; padding:10px; border-radius:10px; border:1px solid #ddd;">
                <button type="submit" class="btn btn-secondary" style="background:var(--accent-orange); color:white;">تفعيل التنبيه</button>
            </form>
        </div>
    </div>

    <div id="nominateModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModals()">&times;</span>
            <h2>رشح دورة جديدة</h2>
            <form id="nomForm" action="https://formspree.io/f/meerewpw" method="POST">
                <input type="text" name="اسم_الدورة_المقترحة" placeholder="اسم الدورة" required style="width:100%; margin-bottom:10px; padding:10px; border-radius:10px; border:1px solid #ddd;">
                <textarea name="أهمية_الترشيح" placeholder="لماذا هذا الترشيح مهم؟" required style="width:100%; height:100px; padding:10px; border-radius:10px; border:1px solid #ddd;"></textarea>
                <button type="submit" class="btn btn-primary">إرسال الترشيح</button>
            </form>
        </div>
    </div>

    <div class="quick-access-btn" onclick="toggleQuickMenu()"><i class="fas fa-th-large"></i></div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBltsN_YuPhicWCv4MmbYf7-kSp9u66lBE",
            authDomain: "sudanse-nursing-network.firebaseapp.com",
            databaseURL: "https://sudanse-nursing-network-default-rtdb.firebaseio.com/",
            projectId: "sudanse-nursing-network",
            storageBucket: "sudanse-nursing-network.firebasestorage.app",
            messagingSenderId: "577008528931",
            appId: "1:577008528931:web:febfbc9ce086a07b8ccb96"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // جلب وتوزيع البيانات تلقائياً
        database.ref('training_center').on('value', (snapshot) => {
            const availCont = document.getElementById('availableContainer');
            const upCont = document.getElementById('upcomingContainer');
            availCont.innerHTML = ''; upCont.innerHTML = '';
            
            let availCount = 0; let upCount = 0;

            snapshot.forEach(child => {
                const c = child.val();
                const card = `
                    <div class="course-card" style="border-top-color: ${c.status === 'available' ? 'var(--main-color)' : 'var(--accent-orange)'}">
                        <div class="course-header">
                            <span class="course-category" style="background: ${c.status === 'available' ? 'var(--main-color)' : 'var(--accent-orange)'}">${c.category}</span>
                            <h3 style="margin-top:15px;">${c.title}</h3>
                        </div>
                        <div class="course-body">
                            <ul class="course-info-list">
                                <li><i class="fas fa-calendar-alt"></i> <b>البدء:</b> ${c.date}</li>
                                <li><i class="fas fa-clock"></i> ${c.info}</li>
                                ${c.status === 'available' ? `<li><i class="fas fa-users"></i> <span class="availability">${c.seats}</span></li>` : ''}
                            </ul>
                        </div>
                        <div style="padding:20px;">
                            ${c.status === 'available' ? 
                                `<button class="btn btn-primary" onclick="openModal('regModal', '${c.title}')">سجل الآن</button>` :
                                `<button class="btn btn-secondary" onclick="openModal('notifyModal', '${c.title}')">أعلمني عند البدء</button>`
                            }
                        </div>
                    </div>`;
                
                if(c.status === 'available') { availCont.innerHTML += card; availCount++; }
                else { upCont.innerHTML += card; upCount++; }
            });
            document.getElementById('availableTitle').innerText = `الدورات التدريبية المتاحة (${availCount} دورة)`;
        });

        function openModal(id, title) {
            document.getElementById(id).style.display = 'block';
            if(title) {
                if(id === 'regModal') { document.getElementById('regTitle').innerText = "سجل في: " + title; document.getElementById('hiddenCourseReg').value = title; }
                if(id === 'notifyModal') { document.getElementById('notifyTitle').innerText = "تنبيه لـ: " + title; document.getElementById('hiddenCourseNotify').value = title; }
            }
        }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        function toggleQuickMenu() { const q = document.getElementById('quickMenu'); q.style.display = q.style.display === 'block' ? 'none' : 'block'; }
    </script>
</body>
</html>
