<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة نبض الميدان | لوحة التحكم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --deep-green: #064e3b; --primary-gold: #c29d0b; }
        body { font-family: 'Cairo', sans-serif; background-color: #f4f7f6; padding: 20px; direction: rtl; }
        .admin-card { background: white; max-width: 700px; margin: 0 auto; padding: 35px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-top: 8px solid var(--deep-green); }
        h2 { color: var(--deep-green); text-align: center; margin-bottom: 25px; font-weight: 900; }
        .form-section { background: #f8fafc; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #334155; }
        input, select, textarea { width: 100%; padding: 14px; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 12px; font-family: 'Cairo'; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary-gold); }
        .btn-publish { width: 100%; padding: 18px; background: linear-gradient(45deg, var(--deep-green), #0a5f49); color: white; border: none; border-radius: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-publish:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(6,78,59,0.3); }
        .act-list { margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px; }
        .act-item { background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-delete { background: #fee2e2; color: #ef4444; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="admin-card">
    <h2><i class="fas fa-camera-retro"></i> إدارة نبض الميدان</h2>
    
    <div class="form-section">
        <label>عنوان النشاط</label>
        <input type="text" id="actTitle" placeholder="مثلاً: المشاركة في اليوم العالمي للتمريض">
        
        <label>نوع النشاط</label>
        <select id="actTag">
            <option value="ميداني">نشاط ميداني</option>
            <option value="إنجاز">إنجاز جديد</option>
            <option value="تطوعي">عمل تطوعي</option>
            <option value="رقمي">نشاط رقمي</option>
        </select>

        <label>تاريخ النشاط</label>
        <input type="text" id="actDate" placeholder="مثلاً: 12 مايو 2025">

        <label>رابط صورة النشاط (URL)</label>
        <input type="text" id="actImg" placeholder="ضع رابط الصورة هنا">

        <label>وصف النشاط</label>
        <textarea id="actDesc" rows="4" placeholder="اكتب تفاصيل النشاط هنا..."></textarea>

        <label>كتاب الزوار (تعليقات مميزة)</label>
        <input type="text" id="actGuest" placeholder="مثلاً: د.سارة: فخورين بيكم | م.أحمد: جامعة دنقلا..">
    </div>

    <button class="btn-publish" onclick="pushActivity()">نشر النشاط في الميدان الآن <i class="fas fa-upload"></i></button>
    
    <div class="act-list">
        <h3>النشاطات الموثقة حالياً:</h3>
        <div id="activeActs"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBltsN_YuPhicWCv4MmbYf7-kSp9u66lBE",
        authDomain: "sudanse-nursing-network.firebaseapp.com",
        databaseURL: "https://sudanse-nursing-network-default-rtdb.firebaseio.com/",
        projectId: "sudanse-nursing-network",
        storageBucket: "sudanse-nursing-network.firebasestorage.app",
        messagingSenderId: "577008528931",
        appId: "1:577008528931:web:febfbc9ce086a07b8ccb96"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function pushActivity() {
        const title = document.getElementById('actTitle').value;
        const tag = document.getElementById('actTag').value;
        const date = document.getElementById('actDate').value;
        const img = document.getElementById('actImg').value || "network_bg.jpg";
        const desc = document.getElementById('actDesc').value;
        const guest = document.getElementById('actGuest').value;

        if (!title || !desc) return alert("يا الرشيد، املأ العنوان والوصف!");

        const newActRef = database.ref('activities').push();
        newActRef.set({
            title, tag, date, img, desc, guest,
            timestamp: Date.now()
        }).then(() => {
            alert("✅ تم توثيق النشاط بنجاح!");
            document.getElementById('actTitle').value = "";
            document.getElementById('actDesc').value = "";
        });
    }

    database.ref('activities').on('value', (snapshot) => {
        const list = document.getElementById('activeActs');
        list.innerHTML = '';
        snapshot.forEach(child => {
            const data = child.val();
            list.innerHTML += `
                <div class="act-item">
                    <span><strong>${data.title}</strong> (${data.date})</span>
                    <button class="btn-delete" onclick="deleteAct('${child.key}')">حذف</button>
                </div>`;
        });
    });

    function deleteAct(key) {
        if(confirm("هل تريد حذف هذا التوثيق نهائياً؟")) database.ref('activities/' + key).remove();
    }
</script>
</body>
</html>
